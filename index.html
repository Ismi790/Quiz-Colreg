<body>
    <div class="container" id="app">

    <script>
        // ============================================================
        // DATA SOAL
        // ============================================================
        const quizData = [{
            question: "Kapal mana yang memiliki hak jalan (stand-on vessel) ketika dua kapal bertenaga mesin bertemu saling berlawanan arah?",
            options: [
                "Kapal yang berada di sisi kanan (starboard)",

        }, {
            question: "Dalam situasi crossing, kapal mana yang harus mendahului (give-way) jika kapal lain terlihat di sisi kanan?",
            options: [
                "Kapal yang melihat kapal lain di sisi kanannya (starboard)",
                "Kapal yang melihat kapal lain di sisi kirinya (port)",
                "Kapal yang lebih kecil",
                "Kapal yang lebih lambat"
            ],
            answer: 0,
            explanation: "Aturan 15 (crossing situation): kapal yang memiliki kapal lain di sisi kanannya (starboard) harus mendahului (give-way), dan menghindari di depan kapal tersebut. Jadi kapal dengan kapal lain di starboard-nya adalah give-way vessel."
        }, {
            question: "Apa yang dimaksud dengan 'stand-on vessel' dalam COLREG?",
            options: [
                "Kapal yang harus mempertahankan haluan dan kecepatannya",
                "Kapal yang harus segera melakukan tindakan menghindar",
                "Kapal yang memiliki hak untuk didahului",
                "Kapal yang berada di pelabuhan"
            ],
            answer: 0,
            explanation: "'Stand-on vessel' adalah kapal yang wajib mempertahankan haluan dan kecepatannya (hold course and speed) dalam situasi tertentu, sementara kapal lain (give-way) yang harus melakukan tindakan menghindar."
        }, {
            question: "Kapan jam jaga (watchkeeping) di atas kapal harus dilakukan sesuai STCW?",
            options: [
                "Hanya saat kapal berlayar di laut lepas",
                "24 jam sehari, baik di laut maupun di pelabuhan",
                "Hanya saat malam hari",
                "Saat cuaca buruk saja"
            ],
            answer: 1,
            explanation: "Prinsip watchkeeping (STCW) mewajibkan pengawasan terus menerus 24 jam sehari, baik saat kapal berlayar, di perairan sempit, maupun saat berlabuh di pelabuhan (sesuai ketentuan)."
        }, {
            question: "Pada malam hari, kapal yang sedang berlayar wajib memperlihatkan lampu apa?",
            options: [
                "Lampu putih di tiang depan dan lampu hijau-merah di sisi",
                "Lampu merah di kanan dan hijau di kiri",
                "Lampu putih di buritan dan lampu kuning di haluan",
                "Lampu hijau di kanan, merah di kiri, dan lampu putih di tiang & buritan"
            ],
            answer: 3,
            explanation: "Aturan pencahayaan (Rule 21-23): kapal bertenaga mesin yang sedang berlayar harus menampilkan lampu tiang (putih), lampu sisi (hijau di kanan, merah di kiri), dan lampu buritan (putih)."
        }, {
            question: "Dalam kabut atau jarak pandang terbatas, isyarat bunyi apa yang harus diberikan kapal bertenaga mesin yang sedang berlayar?",
            options: [
                "Satu tiupan panjang setiap 2 menit",
                "Satu tiupan panjang dan dua tiupan pendek setiap 2 menit",
                "Satu tiupan panjang setiap 1 menit",
                "Dua tiupan panjang setiap 2 menit"
            ],
            answer: 0,
            explanation: "Aturan 35 (signal in restricted visibility): kapal bertenaga mesin yang berlayar harus membunyikan satu tiupan panjang setiap 2 menit. Kapal yang tidak dapat bergerak membunyikan dua tiupan panjang dan satu pendek, dsb."
        }, {
            question: "Apa yang harus dilakukan oleh officer of the watch (OOW) jika melihat kapal lain mendekat dan terjadi risiko tabrakan?",
            options: [
                "Segera membangunkan nakhoda",
                "Melakukan tindakan menghindar yang tegas dan tepat waktu",
                "Mengurangi kecepatan secara drastis",
                "Mengubah haluan ke kiri tanpa pemberitahuan"
            ],
            answer: 1,
            explanation: "OOW wajib mengambil tindakan menghindar yang tegas, tepat waktu, dan sesuai COLREG. Tindakan harus jelas dan dapat diamati oleh kapal lain."
        }, {
            question: "Manakah pernyataan yang benar mengenai 'duty officer' di jaga malam?",
            options: [
                "Dilarang meninggalkan anjungan meskipun sebentar",
                "Harus selalu berada di anjungan dan waspada",

        }, {
            question: "Jika terjadi tabrakan yang tidak dapat dihindari, tindakan pertama yang harus dilakukan oleh perwira jaga adalah...",
            options: [

                "Menghentikan mesin dan membunyikan alarm darurat",
                "Menghubungi nakhoda dan memulai prosedur darurat",
                "Mengamankan dokumen kapal"

            answer: 2,
            explanation: "Langkah awal adalah segera menghubungi nakhoda, mengaktifkan alarm darurat, dan menjalankan prosedur darurat sesuai SOP kapal."
        }, {
            question: "Berdasarkan COLREG, kapal yang sedang memancing (fishing vessel) memiliki hak jalan terhadap kapal apa?",
            options: [
                "Kapal layar (sailing vessel)",
                "Kapal bertenaga mesin yang sedang berlayar",
                "Kapal yang tidak dapat bergerak (NUC)",
                "Tidak memiliki hak jalan terhadap kapal manapun jika sedang memancing"
            ],
            answer: 1,
            explanation: "Menurut Aturan 18 (Responsibilities between vessels): kapal memancing (fishing) harus menjaga jarak dari kapal yang tidak dapat bergerak (NUC) atau kapal yang terbatas kemampuannya, tetapi memiliki hak jalan terhadap kapal bertenaga mesin yang sedang berlayar (kecuali NUC)."
        }];

        // ============================================================
        // STATE
        // ============================================================
        let userAnswers = new Array(quizData.length).fill(null);
        let isSubmitted = false;

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const container = document.getElementById('questionsContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');

        // ============================================================
        // RENDER FUNCTION
        // ============================================================
        function render() {
            let html = '';

            quizData.forEach((item, index) => {
                const selected = userAnswers[index];
                const isCorrect = (selected !== null && selected === item.answer);
                let cardClass = 'question-card';

                if (isSubmitted && selected !== null) {
                    cardClass += isCorrect ? ' correct' : ' wrong';
                }

                html += `<div class="${cardClass}">`;
                html += `<div class="question-text">`;
                html += `<span class="question-number">Soal ${index + 1}</span>`;
                html += item.question;
                html += `</div>`;

                html += `<div class="options">`;

                item.options.forEach((opt, optIdx) => {
                    let optionClass = 'option';
                    let isSelected = (selected === optIdx);
                    let isCorrectAnswer = (optIdx === item.answer);
                    let isWrongSelected = (isSelected && !isCorrectAnswer);

                    if (isSubmitted) {
                        if (isCorrectAnswer) {
                            optionClass += ' correct-answer';
                        }
                        if (isWrongSelected) {
                            optionClass += ' wrong-answer';
                        }
                        if (isSelected) {
                            optionClass += ' selected';
                        }
                        // disable all radio when submitted
                    } else {
                        if (isSelected) {
                            optionClass += ' selected';
                        }
                    }

                    const disabled = isSubmitted ? 'disabled' : '';
                    const checked = isSelected ? 'checked' : '';

                    html += `<label class="${optionClass}">`;
                    html += `<input type="radio" name="q${index}" value="${optIdx}" ${checked} ${disabled} data-q="${index}" data-opt="${optIdx}">`;
                    html += `<span class="option-text">${String.fromCharCode(65 + optIdx)}. ${opt}</span>`;
                    html += `</label>`;
                });

                html += `</div>`;

                // Explanation
                let explClass = 'explanation';
                if (isSubmitted && selected !== null) {
                    explClass += ' show';
                }

                html += `<div class="${explClass}">`;
                html += `<span class="label">📘 Penjelasan</span>`;

                if (isSubmitted && selected !== null) {
                    const resultClass = isCorrect ? 'correct' : 'wrong';
                    const resultText = isCorrect ? '✅ Benar' : '❌ Salah';
                    html += `<span class="result ${resultClass}">${resultText}</span>`;
                }

                html += item.explanation;
                html += `</div>`;

                html += `</div>`;
            });

            container.innerHTML = html;

            // Update score
            if (isSubmitted) {
                let correct = 0;
                for (let i = 0; i < quizData.length; i++) {
                    if (userAnswers[i] !== null && userAnswers[i] === quizData[i].answer) {
                        correct++;
                    }
                }
                scoreDisplay.textContent = correct;
            } else {
                scoreDisplay.textContent = '0';
            }

            // Attach event listeners to radio buttons (only if not submitted)
            if (!isSubmitted) {
                document.querySelectorAll('input[type="radio"]').forEach(radio => {
                    radio.addEventListener('change', function(e) {
                        const qIdx = parseInt(this.dataset.q);
                        const optVal = parseInt(this.dataset.opt);
                        userAnswers[qIdx] = optVal;

                        // Update visual selection
                        const parentCard = this.closest('.question-card');
                        const labels = parentCard.querySelectorAll('.option');
                        labels.forEach((label, idx) => {
                            label.classList.remove('selected');
                            const radio = label.querySelector('input[type="radio"]');
                            if (radio && radio.checked) {
                                label.classList.add('selected');
                            }
                        });
                    });
                });
            }
        }

        // ============================================================
        // EVENT HANDLERS
        // ============================================================
        function handleSubmit() {
            const allAnswered = userAnswers.every(val => val !== null);
            if (!allAnswered) {
                if (!confirm('⚠️ Ada pertanyaan yang belum dijawab. Tetap periksa?')) {
                    return;
                }
            }

            isSubmitted = true;
            render();
            submitBtn.disabled = true;
        }

        function handleReset() {
            if (isSubmitted) {
                if (!confirm('Reset semua jawaban dan mulai ulang?')) {
                    return;
                }
            }
            userAnswers = new Array(quizData.length).fill(null);
            isSubmitted = false;
            submitBtn.disabled = false;
            render();
        }

        // ============================================================
        // INIT
        // ============================================================
        render();
        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', handleReset);
    </script>
</body>
</html>
